<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Government of Bangladesh Organizational Chart</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script>
    (() => {
      try {
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.dataset.theme = savedTheme || (prefersDark ? 'dark' : 'light');
      } catch {
        document.documentElement.dataset.theme = 'light';
      }
    })();
  </script>
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface-raised: rgba(255,255,255,.86);
      --surface-soft: #f1f5f9;
      --text: #0f172a;
      --muted: #64748b;
      --border: #dbeafe;
      --line: #bfdbfe;
      --accent: #1e40af;
      --accent-2: #3b82f6;
      --match: #d97706;
      --match-bg: #fffbeb;
      --header-bg: rgba(255,255,255,.82);
      --status-bg: rgba(255,255,255,.84);
      --focus-ring: rgba(30,64,175,.16);
      --menu-shadow: 0 18px 44px rgba(30,58,138,.14);
      --node-shadow: 0 16px 34px rgba(30,58,138,.10);
      --grid: rgba(37,99,235,.10);
      --mobile-chart-top: 174px;
      --mobile-chart-bottom: calc(72px + env(safe-area-inset-bottom));
    }
    :root[data-theme="dark"] {
      --bg: #07111f;
      --surface: #0f172a;
      --surface-raised: rgba(15,23,42,.84);
      --surface-soft: #172033;
      --text: #e5edf6;
      --muted: #94a3b8;
      --border: #1e3a5f;
      --line: #315171;
      --accent: #60a5fa;
      --accent-2: #93c5fd;
      --match: #f59e0b;
      --match-bg: #312e16;
      --header-bg: rgba(8,15,28,.84);
      --status-bg: rgba(8,15,28,.82);
      --focus-ring: rgba(96,165,250,.18);
      --menu-shadow: 0 18px 44px rgba(0,0,0,.34);
      --node-shadow: 0 18px 36px rgba(0,0,0,.22);
      --grid: rgba(147,197,253,.09);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 8%, rgba(59,130,246,.16), transparent 34%),
        radial-gradient(circle at 84% 12%, rgba(217,119,6,.10), transparent 30%),
        linear-gradient(180deg, var(--bg), var(--bg));
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }
    :root[lang="bn"] body {
      font-family: "Noto Sans Bengali", "Hind Siliguri", Inter, ui-sans-serif, system-ui, sans-serif;
    }
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: minmax(260px, 1fr) minmax(320px, 560px) minmax(260px, auto);
      gap: 14px;
      align-items: center;
      margin: 12px;
      padding: 14px 16px;
      background: var(--header-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--menu-shadow);
      backdrop-filter: blur(18px);
    }
    h1 { margin: 0; font-size: clamp(15px, 2vw, 19px); letter-spacing: -0.02em; font-weight: 650; }
    .subtitle { margin-top: 3px; color: var(--muted); font-size: 12px; }
    .eyebrow {
      margin-bottom: 4px;
      color: var(--accent);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .11em;
      text-transform: uppercase;
    }
    .search-wrap { position: relative; }
    .search-wrap::before {
      content: '';
      position: absolute;
      left: 13px;
      top: 50%;
      width: 13px;
      height: 13px;
      border: 2px solid var(--muted);
      border-radius: 50%;
      transform: translateY(-55%);
      opacity: .72;
    }
    .search-wrap::after {
      content: '';
      position: absolute;
      left: 25px;
      top: calc(50% + 6px);
      width: 7px;
      height: 2px;
      border-radius: 999px;
      background: var(--muted);
      transform: rotate(45deg);
      opacity: .72;
    }
    #search {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 42px 12px 40px;
      color: var(--text);
      background: var(--surface-raised);
      outline: none;
      min-height: 44px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.45);
      transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }
    #search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--focus-ring); }
    #clearSearch {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 30px;
      height: 30px;
      border: 0;
      border-radius: 10px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      font-size: 18px;
      touch-action: manipulation;
    }
    #clearSearch:hover { color: var(--text); background: var(--surface-soft); }
    .controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: flex-end; }
    button.control {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      border: 1px solid var(--border);
      color: var(--text);
      background: var(--surface-raised);
      border-radius: 12px;
      min-height: 40px;
      padding: 9px 13px;
      cursor: pointer;
      touch-action: manipulation;
      font-weight: 600;
      transition: transform 140ms ease, border-color 160ms ease, color 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }
    button.control.icon-only {
      width: 42px;
      padding: 0;
    }
    button.control svg {
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }
    .lang-mark {
      min-width: 24px;
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: .02em;
    }
    :root[lang="bn"] .lang-mark { letter-spacing: 0; }
    button.control:hover { background: var(--surface-soft); border-color: var(--accent-2); transform: translateY(-1px); }
    button.control:focus-visible,
    #search:focus-visible,
    #clearSearch:focus-visible { outline: 0; box-shadow: 0 0 0 3px var(--focus-ring); }
    .segmented {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      padding: 3px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: color-mix(in srgb, var(--surface-soft) 76%, transparent);
    }
    .segmented .control {
      border: 0;
      padding: 8px 11px;
      background: transparent;
    }
    .segmented .control.active { background: var(--surface); box-shadow: 0 7px 18px rgba(30,64,175,.10); }
    .toolbar-group { display: inline-flex; gap: 8px; align-items: center; }
    .floating-actions {
      position: fixed;
      right: 18px;
      bottom: 96px;
      z-index: 9;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 7px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--status-bg);
      box-shadow: var(--menu-shadow);
      backdrop-filter: blur(16px);
    }
    #chart {
      position: fixed;
      inset: 104px 12px 12px 12px;
      overflow: hidden;
      border-radius: 22px;
      transform: translateZ(0);
      backface-visibility: hidden;
      will-change: transform;
      contain: layout paint size;
      overscroll-behavior: contain;
      touch-action: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    #chart::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: radial-gradient(circle at center, #000 42%, transparent 82%);
      pointer-events: none;
    }
    svg { position: relative; z-index: 1; width: 100%; height: 100%; display: block; cursor: grab; touch-action: none; }
    svg:active { cursor: grabbing; }
    .link { fill: none; stroke: var(--line); stroke-width: 1.2px; }
    .node-card {
      cursor: pointer;
      filter: drop-shadow(var(--node-shadow));
    }
    .node-card:focus { outline: none; }
    .node-rect {
      rx: 14px;
      stroke: var(--border);
      stroke-width: 1.2px;
      fill: var(--surface);
      transition: stroke 180ms ease, fill 180ms ease;
    }
    .node-kind-stripe {
      rx: 3px;
      pointer-events: none;
    }
    .node-card:hover .node-rect {
      stroke: var(--accent-2);
      stroke-width: 1.8px;
      fill: color-mix(in srgb, var(--surface) 88%, var(--surface-soft));
    }
    .node-card:focus-visible .node-rect {
      stroke: var(--accent);
      stroke-width: 2px;
    }
    .node-title {
      fill: var(--text);
      font-size: 14px;
      font-weight: 650;
      pointer-events: none;
    }
    .node-meta {
      fill: var(--muted);
      font-size: 11px;
      pointer-events: none;
    }
    #chart.zoom-simplified .node-card { filter: none; }
    #chart.zoom-simplified .node-title,
    #chart.zoom-simplified .node-meta { opacity: 0; }
    #chart.zoom-simplified .link { stroke-width: 2px; opacity: .7; }
    button.control.active { border-color: var(--accent); color: var(--accent); background: color-mix(in srgb, var(--surface) 88%, var(--accent) 12%); }
    .kind-pillar-executive .node-rect,
    .kind-pillar-legislative .node-rect,
    .kind-pillar-judicial .node-rect { stroke: var(--accent); }
    .matched .node-rect { stroke: var(--match); stroke-width: 2px; fill: var(--match-bg); }
    .ancestor-match .node-rect { stroke: var(--match); }
    .status {
      position: fixed;
      right: 18px;
      bottom: 16px;
      z-index: 8;
      max-width: 360px;
      padding: 11px 13px;
      border-radius: 16px;
      background: var(--status-bg);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
      box-shadow: var(--menu-shadow);
      backdrop-filter: blur(16px);
    }
    .mini { color: var(--text); }
    .tooltip {
      position: fixed;
      z-index: 20;
      max-width: 320px;
      padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--surface);
      box-shadow: var(--menu-shadow);
      color: var(--text);
      font-size: 12px;
      line-height: 1.35;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, calc(-100% - 14px));
      transition: opacity 140ms ease, transform 140ms ease;
    }
    .tooltip.visible { opacity: 1; transform: translate(-50%, calc(-100% - 18px)); }
    .tooltip-title { font-weight: 700; margin-bottom: 7px; }
    .tooltip-row { display: flex; gap: 8px; align-items: center; color: var(--muted); }
    .tooltip-kind-dot { width: 9px; height: 9px; border-radius: 50%; flex: 0 0 auto; }
    .tooltip-detail { margin-top: 6px; color: var(--muted); }
    @media (max-width: 860px) {
      body { min-height: 100dvh; }
      header {
        grid-template-columns: minmax(0, 1fr);
        gap: 8px;
        margin: 8px;
        margin-top: calc(8px + env(safe-area-inset-top));
        padding: 10px;
        border-radius: 18px;
      }
      h1 {
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 16px;
      }
      .eyebrow { margin-bottom: 2px; font-size: 10px; }
      .subtitle { display: none; }
      #search {
        min-height: 44px;
        padding-top: 10px;
        padding-bottom: 10px;
        font-size: 16px;
      }
      #clearSearch { width: 36px; height: 36px; }
      .controls {
        flex-wrap: nowrap;
        justify-content: flex-start;
        gap: 8px;
        overflow-x: auto;
        padding-bottom: 2px;
        scrollbar-width: none;
        -webkit-overflow-scrolling: touch;
      }
      .controls::-webkit-scrollbar { display: none; }
      .segmented { flex: 0 0 auto; }
      button.control {
        min-width: 44px;
        min-height: 44px;
        border-radius: 13px;
      }
      button.control.icon-only { width: 44px; }
      .segmented .control { padding: 8px 10px; }
      #chart {
        inset: var(--mobile-chart-top) 8px var(--mobile-chart-bottom) 8px;
        border-radius: 18px;
      }
      .floating-actions {
        left: 8px;
        right: 8px;
        bottom: calc(8px + env(safe-area-inset-bottom));
        flex-direction: row;
        justify-content: space-between;
        gap: 6px;
        padding: 6px;
        border-radius: 18px;
      }
      .floating-actions .control { flex: 1 1 0; }
      .status {
        left: 12px;
        right: 12px;
        bottom: calc(var(--mobile-chart-bottom) + 4px);
        max-width: none;
        padding: 8px 10px;
        font-size: 11px;
        pointer-events: none;
      }
      .tooltip { display: none; }
    }
    @media (max-width: 420px) {
      header { gap: 7px; padding: 9px; }
      .eyebrow { display: none; }
      .status { display: none; }
    }
    @media (max-height: 620px) and (max-width: 860px) {
      .eyebrow,
      .subtitle,
      .status { display: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition-duration: .01ms !important; animation-duration: .01ms !important; scroll-behavior: auto !important; }
    }
  </style>
</head>
<body>
  <header>
    <div>

      <h1 id="pageTitle">Government of Bangladesh Apparatus</h1>
      <div class="subtitle" id="subtitle">Drill down from the three constitutional organs. Click any node to expand or collapse.</div>
    </div>
    <div class="search-wrap">
      <input id="search" autocomplete="off" placeholder="Search agencies, acronyms, ministries: NBR, BTRC, DGHS..." />
      <button id="clearSearch" title="Clear search">×</button>
    </div>
    <div class="controls">
      <div class="segmented" aria-label="Layout orientation">

        <button class="control icon-only" id="topdown">Top-down</button>
      </div>
      <div class="segmented" aria-label="Language">
        <button class="control icon-only active" id="langEn" aria-label="English" title="English"><span class="lang-mark">EN</span></button>
        <button class="control icon-only" id="langBn" aria-label="বাংলা" title="বাংলা"><span class="lang-mark">বাং</span></button>
      </div>
      <button class="control icon-only" id="themeToggle" aria-pressed="false">Dark</button>
    </div>
  </header>
  <main id="chart" aria-label="Interactive organizational chart"></main>
  <div class="floating-actions" aria-label="Chart actions">
    <button class="control icon-only" id="fit">Fit to screen</button>
    <button class="control icon-only" id="collapse">Collapse to organs</button>
    <button class="control icon-only" id="expandAll">Expand everything</button>
  </div>
  <div class="status" id="status">Initial view: <span class="mini">Executive, Legislative, Judicial</span>. Use wheel to zoom and drag to pan.</div>

      button.title = label;
    }
    function labelActionButton(id, iconName, label, small) {
      const button = document.getElementById(id);
      button.innerHTML = icons[iconName] || '';
      button.setAttribute('aria-label', `${label}. ${small}`);
      button.title = `${label} - ${small}`;
    }

    function moveTooltip(event) {
      const x = Math.min(width() - 14, Math.max(14, event.clientX));
      const y = Math.min(window.innerHeight - 14, Math.max(94, event.clientY));
      tooltip.style('left', `${x}px`).style('top', `${y}px`);
    }
    function showTooltip(event, d) {
      const label = kindLabel(d);
      const color = kindColors[d.data.kind] || kindColors.default;
      const total = childCount(d);
      const expanded = visibleChildCount(d);
      const collapsed = hiddenChildCount(d);
      const childText = total ? `${numberText(total)} ${total === 1 ? t('childNode') : t('childNodes')}` : t('noChild');
      const stateText = total ? `${numberText(expanded)} ${t('visibleWord')}, ${numberText(collapsed)} ${t('collapsed')}` : t('leaf');
      tooltip
        .html(`<div class="tooltip-title">${escapeHtml(displayName(d))}</div><div class="tooltip-row"><span class="tooltip-kind-dot" style="background:${color}"></span><span>${escapeHtml(label)}</span></div><div class="tooltip-detail">${escapeHtml(childText)}. ${escapeHtml(stateText)}.</div>`)
        .classed('visible', true);
      tooltipVisible = true;
      moveTooltip(event);
    }
    function scheduleTooltip(event, d) {
      clearTimeout(tooltipTimer);
      const x = event.clientX;
      const y = event.clientY;
      tooltipTimer = setTimeout(() => showTooltip({ clientX: x, clientY: y }, d), 420);
    }
    function handleTooltipMove(event, d) {
      if (tooltipVisible) {
        moveTooltip(event);
      } else {
        scheduleTooltip(event, d);
      }
    }
    function hideTooltip() {
      clearTimeout(tooltipTimer);
      tooltipVisible = false;
      tooltip.classed('visible', false);
    }
    function touchPoint(event) {
      const touch = event.changedTouches?.[0] || event.touches?.[0];
      return touch ? { x: touch.clientX, y: touch.clientY } : null;
    }
    function handleNodeTouchStart(event, d) {
      const point = touchPoint(event);
      if (!point) return;
      event.stopPropagation();
      nodeTouchStarts.set(d.id, point);
    }
    function handleNodeTouchEnd(event, d) {
      const start = nodeTouchStarts.get(d.id);
      nodeTouchStarts.delete(d.id);
      const end = touchPoint(event);
      if (!start || !end) return;
      event.stopPropagation();
      const moved = Math.hypot(end.x - start.x, end.y - start.y);
      if (moved > 12) return;
      event.preventDefault();
      ignoreClickUntil = Date.now() + 700;
      toggleNode(d, event);
    }
    function handleNodeTouchCancel(event, d) {
      nodeTouchStarts.delete(d.id);
    }
    function toggleNode(d, event) {
      const isExpanding = !d.children && !!d._children;
      if (d.children) { d._children = d.children; d.children = null; }
      else if (d._children) { d.children = d._children; d._children = null; }
      update(d);
      if (event && tooltipVisible) showTooltip(event, d);
      if (isExpanding) centerOnNode(d);
    }

    function update(source = root) {
      const tree = d3.tree().nodeSize(isVertical() ? [verticalSiblingSpacing, cardH + verticalNodeGap] : [horizontalSiblingSpacing, 120]);
      tree(root);
      const nodes = root.descendants().filter(d => d.depth > 0);
      const links = root.links().filter(d => d.source.depth > 0);
      root.descendants().forEach(d => d.y = (d.depth - 1) * levelGap());
      const sourceOrigin = { x: source.x0 ?? source.x, y: source.y0 ?? source.y };
      const duration = transitionDuration(360);
      const exitDuration = transitionDuration(260);

      const link = linkLayer.selectAll('path.link').data(links, d => d.target.id);
      link.enter().append('path')
        .attr('class', 'link')
        .attr('d', () => diagonal({ source: sourceOrigin, target: sourceOrigin }))
        .merge(link)
        .transition().duration(duration)
        .attr('d', diagonal);
      link.exit().transition().duration(exitDuration).attr('d', () => diagonal({ source: sourceOrigin, target: sourceOrigin })).remove();

      const node = nodeLayer.selectAll('g.node-card').data(nodes, d => d.id);
      const enter = node.enter().append('g')
        .attr('class', d => nodeClass(d))
        .attr('role', 'button')
        .attr('tabindex', 0)
        .attr('transform', () => nodeTransform({ x: source.x0 ?? source.x, y: source.y0 ?? source.y }))
        .on('click', (event, d) => {
          event.stopPropagation();
          if (Date.now() < ignoreClickUntil) return;
          toggleNode(d, event);
        })
        .on('touchstart', handleNodeTouchStart)
        .on('touchend', handleNodeTouchEnd)
        .on('touchcancel', handleNodeTouchCancel)
        .on('keydown', (event, d) => {
          if (event.key !== 'Enter' && event.key !== ' ') return;
          event.preventDefault();
          toggleNode(d, event);
        })
        .on('mouseenter', scheduleTooltip)
        .on('mousemove', handleTooltipMove)
        .on('mouseleave', hideTooltip);
      enter.append('rect').attr('class', 'node-rect').attr('x', -cardW / 2).attr('y', -cardH / 2).attr('width', cardW).attr('height', cardH);
      enter.append('rect').attr('class', 'node-kind-stripe').attr('x', -cardW / 2 + 12).attr('y', -cardH / 2 + 14).attr('width', 5).attr('height', cardH - 28);
      enter.append('text').attr('class', 'node-title').attr('text-anchor', 'middle').attr('dy', -13);
      enter.append('text').attr('class', 'node-meta').attr('text-anchor', 'middle').attr('dy', 30);

      const merged = enter.merge(node);
      merged.attr('class', d => nodeClass(d));
      merged.attr('aria-label', d => `${displayName(d)}. ${kindLabel(d)}. ${childCount(d) ? `${numberText(childCount(d))} ${childCount(d) === 1 ? t('child') : t('children')}` : t('leaf')}.`);
      merged.transition().duration(duration).attr('transform', d => nodeTransform(d));
      merged.select('.node-kind-stripe').attr('fill', d => kindColors[d.data.kind] || kindColors.default);
      merged.select('.node-title').each(function(d) {
        const lines = wrapText(displayName(d), language === 'bn' ? 28 : 36);
        const t = d3.select(this); t.selectAll('tspan').remove();
        lines.forEach((line, i) => t.append('tspan').attr('x', 0).attr('dy', i === 0 ? 0 : 16).text(line));
      });
      merged.select('.node-meta').text(d => {
        const count = childCount(d);
        const label = kindLabel(d);
        return count ? `${label} • ${numberText(count)} ${count === 1 ? t('child') : t('children')}` : label;
      });
      node.exit().transition().duration(exitDuration).attr('transform', () => nodeTransform(sourceOrigin)).remove();
      nodes.forEach(d => { d.x0 = d.x; d.y0 = d.y; });
      status.innerHTML = `${t('visible')}: <span class="mini">${numberText(nodes.length)}</span>. ${t('total')}: <span class="mini">${numberText(allNodes().length - 1)}</span>.`;
    }

    function nodeClass(d) {
      return ['node-card', 'kind-' + (d.data.kind || 'default'), d.data.matched ? 'matched' : '', d.data.ancestorMatch ? 'ancestor-match' : ''].filter(Boolean).join(' ');
    }
    function diagonal(d) {
      const sx = screenX(d.source), sy = screenY(d.source), tx = screenX(d.target), ty = screenY(d.target);
      if (isVertical()) return `M ${sx} ${sy} C ${sx} ${(sy + ty) / 2}, ${tx} ${(sy + ty) / 2}, ${tx} ${ty}`;
      return `M ${sx} ${sy} C ${(sx + tx) / 2} ${sy}, ${(sx + tx) / 2} ${ty}, ${tx} ${ty}`;
    }
    function fitToView() {
      const nodes = root.descendants().filter(d => d.depth > 0);
      if (!nodes.length) return;
      const minX = d3.min(nodes, d => screenX(d)) - cardW;
      const maxX = d3.max(nodes, d => screenX(d)) + cardW;
      const minY = d3.min(nodes, d => screenY(d)) - cardH;
      const maxY = d3.max(nodes, d => screenY(d)) + cardH;
      const scale = Math.min(1.15, Math.max(minZoom, Math.min((width() - margin.left - margin.right) / (maxX - minX || 1), (height() - margin.top - margin.bottom) / (maxY - minY || 1))));
      const tx = (width() - scale * (minX + maxX)) / 2;
      const ty = isVertical() ? margin.top + 10 - scale * minY : (height() - scale * (minY + maxY)) / 2;
      svg.transition().duration(520).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
    }
    function centerOnNode(d) {
      const current = d3.zoomTransform(svg.node());
      const scale = Math.max(current.k, 0.72);
      const tx = width() / 2 - screenX(d) * scale;
      const ty = height() / 2 - screenY(d) * scale;
      svg.transition().duration(520).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
    }

    function search(q) {
      const query = normalizeSearch(q);
      clearMatches();
      collapseToTop();
      if (!query) { update(root); setTimeout(fitToView, 120); return; }
      const matches = allNodes()
        .map(d => ({ d, score: d.depth > 0 ? searchScore(d, query) : 0 }))
        .filter(result => result.score > 0)
        .sort((a, b) => b.score - a.score || a.d.depth - b.d.depth)
        .map(result => result.d);
      matches.forEach(d => {
        d.data.matched = true;
        let p = d.parent;
        while (p) { p.data.ancestorMatch = true; p = p.parent; }
        expandPath(d);
      });
      update(root);
      if (matches[0]) {
        const d = matches[0];
        const currentZoom = d3.zoomTransform(svg.node());
        svg.transition().duration(620).call(zoom.transform, d3.zoomIdentity.translate(width() * (isVertical() ? 0.50 : 0.34) - screenX(d) * Math.max(currentZoom.k, .65), height() * (isVertical() ? 0.28 : 0.50) - screenY(d) * Math.max(currentZoom.k, .65)).scale(Math.max(currentZoom.k, .65)));
        status.innerHTML = `${t('searchFound')} <span class="mini">${numberText(matches.length)}</span> ${t('matching')}`;
      } else {
        status.innerHTML = `${t('noMatch')} <span class="mini">${escapeHtml(q)}</span>. ${t('trySearch')}`;
      }
    }

    function findNodeByIdentifier(identifier) {
      const value = String(identifier ?? '').trim();
      if (!value) return null;
      const normalized = normalizeSearch(value);
      return allNodes().find(d =>
        String(d.id) === value ||
        String(d.data.id ?? '') === value ||
        normalizeSearch(d.data.name) === normalized ||
        normalizeSearch(displayName(d)) === normalized
      ) || null;
    }
    function highlightNode(identifier) {
      const target = findNodeByIdentifier(identifier);
      if (!target || target.depth === 0) return false;
      clearMatches();
      target.data.matched = true;
      let parent = target.parent;
      while (parent) { parent.data.ancestorMatch = true; parent = parent.parent; }
      expandPath(target);
      update(target);
      centerOnNode(target);
      return true;
    }
    function handleNativeMessage(event) {
      const message = typeof event.data === 'string' ? (() => { try { return JSON.parse(event.data); } catch { return { action: 'search', query: event.data }; } })() : event.data;
      if (!message || typeof message !== 'object') return;
      if (message.action === 'search') search(message.query || '');
      if (message.action === 'highlight' || message.action === 'focus') highlightNode(message.id ?? message.name ?? message.query);
      if (message.action === 'fit') fitToView();
      if (message.action === 'collapse') { collapseToTop(); clearMatches(); update(root); setTimeout(fitToView, 120); }
      if (message.action === 'expandAll') { clearMatches(); expandAll(root); update(root); setTimeout(fitToView, 120); }
    }
    window.addEventListener('message', handleNativeMessage);
    document.addEventListener('message', handleNativeMessage);
    chart.setHighlighted = (identifier) => { highlightNode(identifier); return chart; };
    chart.search = (query) => { search(query || ''); return chart; };
    chart.expandAll = () => { clearMatches(); expandAll(root); update(root); return chart; };
    chart.collapseToTop = () => { collapseToTop(); clearMatches(); update(root); return chart; };
    chart.fit = () => { fitToView(); return chart; };
    window.govOrgChart = chart;

    function setTheme(theme) {
      const isDark = theme === 'dark';
      document.documentElement.dataset.theme = isDark ? 'dark' : 'light';
      labelButton('themeToggle', isDark ? 'sun' : 'moon', isDark ? t('light') : t('dark'));
      document.getElementById('themeToggle').setAttribute('aria-pressed', String(isDark));
      try { localStorage.setItem('theme', isDark ? 'dark' : 'light'); } catch {}
    }

    function updateUIText() {
      document.documentElement.lang = language === 'bn' ? 'bn' : 'en';
      document.getElementById('eyebrow').textContent = t('eyebrow');
      document.getElementById('pageTitle').textContent = t('title');
      document.getElementById('subtitle').textContent = t('subtitle');
      document.getElementById('search').placeholder = t('search');
      document.getElementById('clearSearch').title = t('clear');
      labelButton('sideways', 'horizontal', t('sideways'));
      labelButton('topdown', 'vertical', t('topdown'));
      labelLocaleButton('langEn', 'EN', 'English');
      labelLocaleButton('langBn', 'বাং', 'বাংলা');
      labelActionButton('fit', 'fit', t('fit'), t('fitSmall'));
      labelActionButton('collapse', 'collapse', t('collapse'), t('collapseSmall'));
      labelActionButton('expandAll', 'expandAll', t('expandAll'), t('expandAllSmall'));
      document.getElementById('langEn').classList.toggle('active', language === 'en');
      document.getElementById('langBn').classList.toggle('active', language === 'bn');
      status.innerHTML = t('initial');
      setTheme(document.documentElement.dataset.theme || 'light');
    }

    function setLanguage(nextLanguage) {
      language = nextLanguage;
      updateUIText();
      updateMobileChromeMetrics();
      update(root);
      hideTooltip();
      try { localStorage.setItem('language', language); } catch {}
    }

    try { language = localStorage.getItem('language') === 'bn' ? 'bn' : 'en'; } catch {}
    updateUIText();
    document.getElementById('search').addEventListener('input', e => search(e.target.value));
    document.getElementById('clearSearch').addEventListener('click', () => { document.getElementById('search').value = ''; search(''); });
    document.getElementById('themeToggle').addEventListener('click', () => setTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark'));
    document.getElementById('langEn').addEventListener('click', () => setLanguage('en'));
    document.getElementById('langBn').addEventListener('click', () => setLanguage('bn'));
    document.getElementById('fit').addEventListener('click', fitToView);
    document.getElementById('collapse').addEventListener('click', () => { collapseToTop(); clearMatches(); update(root); setTimeout(fitToView, 380); });
    document.getElementById('expandAll').addEventListener('click', () => { clearMatches(); expandAll(root); update(root); setTimeout(fitToView, 520); });
    document.getElementById('sideways').addEventListener('click', () => { layoutMode = 'horizontal'; document.getElementById('sideways').classList.add('active'); document.getElementById('topdown').classList.remove('active'); update(root); setTimeout(fitToView, 380); });
    document.getElementById('topdown').addEventListener('click', () => { layoutMode = 'vertical'; document.getElementById('topdown').classList.add('active'); document.getElementById('sideways').classList.remove('active'); update(root); setTimeout(fitToView, 380); });
    window.addEventListener('resize', () => { updateMobileChromeMetrics(); update(root); fitToView(); });
    updateMobileChromeMetrics();
    update(root);
    setTimeout(fitToView, 80);
  </script>
</body>
</html>
